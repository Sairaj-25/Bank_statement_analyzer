{% if error %}
<!-- ERROR STATE -->
<div class="rounded-xl border border-red-800 bg-red-950/30 p-4">
  <div class="flex items-center gap-2 text-red-400">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
    </svg>
    <h3 class="text-sm font-semibold">Processing Failed</h3>
  </div>
  <p class="mt-2 text-sm text-gray-400">{{ error }}</p>
</div>

{% elif task_id %}
<!-- SUCCESS STATE -->
<div class="rounded-xl border border-green-800 bg-green-950/30 p-5">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div>
      <h3 class="text-lg font-semibold text-green-400">Analysis Complete!</h3>
      <p class="mt-1 text-sm text-gray-400">Statement parsed and categorized successfully.</p>
    </div>
    
    <div class="flex flex-col items-center rounded-lg bg-gray-900 px-4 py-2 text-center shadow sm:min-w-[100px]">
      <span class="text-xs font-medium uppercase tracking-wider text-gray-500">Health Score</span>
      <span class="text-2xl font-bold text-white">{{ score }}<span class="text-sm text-gray-500">/100</span></span>
    </div>
  </div>

  <div class="mt-5 flex flex-col gap-3 sm:flex-row">
    <a href="/dashboard/{{ task_id }}" 
       class="inline-flex flex-1 items-center justify-center gap-2 rounded-lg bg-blue-600 px-4 py-2.5 text-sm font-medium text-white shadow transition hover:bg-blue-700">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z" /><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z" /></svg>
      View Dashboard
    </a>

    <a href="/api/v1/download/{{ task_id }}" 
       class="inline-flex flex-1 items-center justify-center gap-2 rounded-lg border border-gray-700 bg-gray-900 px-4 py-2.5 text-sm font-medium text-gray-200 shadow transition hover:bg-gray-800">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
      Download Excel
    </a>
  </div>
</div>
{% endif %}
